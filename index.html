<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>前额叶实验室 - 认知解锁</title>
    <style>
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        #root { height: 100vh; width: 100vw; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .difficulty-hard { border: 2px solid #ef4444 !important; position: relative; }
        .difficulty-hard::after { content: 'HARD'; position: absolute; top: -8px; right: 10px; background: #ef4444; color: white; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 800; }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slide-up 0.4s ease-out; }
        .locked-overlay { filter: grayscale(1) blur(1px); opacity: 0.6; pointer-events: none; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const render = () => {
                    if (window.lucide && iconRef.current) {
                        iconRef.current.innerHTML = '';
                        const iconEl = document.createElement('i');
                        iconEl.setAttribute('data-lucide', name);
                        iconEl.className = className;
                        iconRef.current.appendChild(iconEl);
                        window.lucide.createIcons({ attrs: { class: className }, nameAttr: 'data-lucide', icons: window.lucide.icons });
                    }
                };
                render();
                const timer = setInterval(() => { if (window.lucide) { render(); clearInterval(timer); } }, 500);
                return () => clearInterval(timer);
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [view, setView] = useState('home'); 
            const [difficulty, setDifficulty] = useState('normal'); 
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(0);
            const [lastScore, setLastScore] = useState(0);
            
            // --- 存档系统：包含解锁状态 ---
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('brain_train_pro_data');
                return saved ? JSON.parse(saved) : { totalSessions: 0, bestScore: 0, isHardUnlocked: false };
            });

            // 检查解锁逻辑
            const updateHistory = (newScore) => {
                const unlockedNow = history.isHardUnlocked || newScore >= 500;
                const newHistory = {
                    totalSessions: history.totalSessions + 1,
                    bestScore: Math.max(history.bestScore, newScore),
                    isHardUnlocked: unlockedNow
                };
                setHistory(newHistory);
                localStorage.setItem('brain_train_pro_data', JSON.stringify(newHistory));
                return unlockedNow && !history.isHardUnlocked; // 返回是否是刚刚解锁
            };

            // --- 游戏生成逻辑 (同前) ---
            const COLORS = [{ name: '红色', val: '#EF4444' }, { name: '蓝色', val: '#3B82F6' }, { name: '绿色', val: '#10B981' }, { name: '黄色', val: '#F59E0B' }, { name: '紫色', val: '#8B5CF6' }, { name: '橙色', val: '#F97316' }];
            const [stroop, setStroop] = useState({ text: '', color: '', opts: [] });
            const [schulte, setSchulte] = useState({ grid: [], next: 1, size: 5 });
            const [nback, setNback] = useState({ current: null, isMatch: false, n: 2 });
            const nbackSeq = useRef([]);

            const nextStroop = () => {
                const pool = COLORS.slice(0, difficulty === 'hard' ? 6 : 4);
                const t = Math.floor(Math.random()*pool.length);
                let c; do { c = Math.floor(Math.random()*pool.length); } while(c === t);
                setStroop({ text: pool[t].name, color: pool[c].val, opts: [...pool].sort(()=>Math.random()-0.5) });
            };

            const startSchulte = () => {
                const size = difficulty === 'hard' ? 6 : 5;
                const nums = Array.from({length: size*size}, (_, i) => i+1).sort(()=>Math.random()-0.5);
                setSchulte({ grid: nums, next: 1, size });
                setView('schulte'); setScore(0); setTimeLeft(size === 6 ? 80 : 60);
            };

            const nextNback = () => {
                const n = difficulty === 'hard' ? 3 : 2;
                const newNum = Math.floor(Math.random() * 9) + 1;
                nbackSeq.current.push(newNum);
                const seq = nbackSeq.current;
                const match = seq.length > n && seq[seq.length-1] === seq[seq.length-(n+1)];
                setNback({ current: newNum, isMatch: match, n });
            };

            useEffect(() => {
                let timer;
                if (timeLeft > 0 && ['stroop', 'schulte', 'nback'].includes(view)) {
                    timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0 && view !== 'home' && view !== 'result') {
                    setLastScore(score);
                    updateHistory(score);
                    setView('result');
                }
                return () => clearInterval(timer);
            }, [timeLeft, view]);

            return (
                <div className="h-full flex flex-col bg-slate-50 text-slate-900 select-none">
                    {view !== 'home' && (
                        <div className="h-14 px-4 flex justify-between items-center bg-white border-b shrink-0 z-30">
                            <button onClick={() => setView('home')} className="p-2 text-slate-400"><Icon name="arrow-left" /></button>
                            <div className="flex gap-4">
                                <div className="text-right font-mono text-lg font-bold">{timeLeft}s</div>
                                <div className="text-right font-mono text-lg font-bold text-indigo-600">{score}</div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 overflow-hidden relative">
                        {view === 'home' && (
                            <div className="p-6 h-full flex flex-col max-w-md mx-auto animate-slide-up">
                                <div className="bg-indigo-600 p-5 rounded-3xl text-white shadow-xl mb-6">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <div className="text-[10px] opacity-70 font-bold uppercase tracking-widest">最高得分记录</div>
                                            <div className="text-4xl font-black">{history.bestScore}</div>
                                        </div>
                                        <div className="text-right text-[10px] font-bold">
                                            {history.isHardUnlocked ? "🔓 进阶模式已解锁" : "🔒 满500分解锁进阶"}
                                        </div>
                                    </div>
                                </div>

                                {/* 难度切换 - 核心解锁逻辑 */}
                                <div className="flex bg-slate-200 p-1 rounded-2xl mb-6">
                                    <button onClick={() => setDifficulty('normal')} className={`flex-1 py-3 rounded-xl text-xs font-bold transition-all ${difficulty === 'normal' ? 'bg-white shadow-md text-indigo-600' : 'text-slate-500'}`}>基础训练</button>
                                    <button 
                                        onClick={() => {
                                            if(history.isHardUnlocked) setDifficulty('hard');
                                            else alert("⚠️ 还需要努力！在基础训练中单次获得 500 分即可解锁进阶模式。");
                                        }} 
                                        className={`flex-1 py-3 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1 ${difficulty === 'hard' ? 'bg-red-500 text-white shadow-md' : 'text-slate-400'}`}
                                    >
                                        {!history.isHardUnlocked && <Icon name="lock" className="w-3 h-3" />}
                                        进阶挑战
                                    </button>
                                </div>

                                <div className={`grid gap-3 ${!history.isHardUnlocked && difficulty === 'hard' ? 'locked-overlay' : ''}`}>
                                    <button onClick={() => startSchulte()} className="flex items-center p-5 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-95 transition-all">
                                        <div className="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center mr-4"><Icon name="grid-3x3" /></div>
                                        <div className="text-left font-bold text-sm">舒尔特方格<div className="text-[10px] text-slate-400 font-normal">{difficulty === 'hard' ? '6x6 极限挑战' : '5x5 视觉广度'}</div></div>
                                    </button>
                                    <button onClick={() => { setView('stroop'); setScore(0); setTimeLeft(30); nextStroop(); }} className="flex items-center p-5 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-95 transition-all">
                                        <div className="w-10 h-10 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center mr-4"><Icon name="zap" /></div>
                                        <div className="text-left font-bold text-sm">Stroop 干扰<div className="text-[10px] text-slate-400 font-normal">{difficulty === 'hard' ? '6色极速抗干扰' : '4色认知抑制'}</div></div>
                                    </button>
                                    <button onClick={() => { setView('nback'); setScore(0); setTimeLeft(60); nbackSeq.current=[]; nextNback(); }} className="flex items-center p-5 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-95 transition-all">
                                        <div className="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center mr-4"><Icon name="refresh-cw" /></div>
                                        <div className="text-left font-bold text-sm">N-Back 记忆<div className="text-[10px] text-slate-400 font-normal">{difficulty === 'hard' ? '3-Back 地狱难度' : '2-Back 工作记忆'}</div></div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 各游戏内容渲染逻辑保持不变 (同之前进阶版代码) */}
                        {view === 'stroop' && (
                            <div className="h-full flex flex-col items-center justify-center p-6 space-y-12">
                                <div className="text-7xl font-black" style={{color: stroop.color}}>{stroop.text}</div>
                                <div className={`grid gap-3 w-full max-w-sm ${difficulty === 'hard' ? 'grid-cols-3' : 'grid-cols-2'}`}>
                                    {stroop.opts.map(o => (
                                        <button key={o.val} onClick={() => {
                                            if(o.val === stroop.color) { setScore(s=>s+10); nextStroop(); }
                                            else { setTimeLeft(t=>Math.max(0, t-3)); }
                                        }} className="py-5 bg-white rounded-2xl font-bold shadow-sm border border-slate-100 active:bg-indigo-50">
                                            {o.name}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'schulte' && (
                            <div className="h-full flex flex-col items-center justify-center p-4">
                                <div className="text-4xl font-black text-indigo-600 mb-6">{schulte.next}</div>
                                <div className={`grid gap-1.5 w-full max-w-sm aspect-square ${schulte.size === 6 ? 'grid-cols-6' : 'grid-cols-5'}`}>
                                    {schulte.grid.map(n => (
                                        <button key={n} onClick={() => {
                                            if(n === schulte.next) {
                                                if(n === schulte.size * schulte.size) { 
                                                    const finalScore = score + (schulte.size === 6 ? 500 : 200);
                                                    setLastScore(finalScore); 
                                                    updateHistory(finalScore);
                                                    setView('result'); 
                                                }
                                                else { setSchulte(p => ({...p, next: p.next+1})); setScore(s=>s+10); }
                                            }
                                        }} className={`flex items-center justify-center font-bold rounded-lg transition-all ${schulte.size === 6 ? 'text-sm' : 'text-lg'} ${n < schulte.next ? 'bg-indigo-600 text-white opacity-20' : 'bg-white shadow-sm border border-slate-100'}`}>
                                            {n}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'nback' && (
                            <div className="h-full flex flex-col items-center justify-center p-6 text-center">
                                <div className="text-xs font-bold text-red-500 mb-2">{nback.n}-Back 挑战</div>
                                <div className="w-28 h-28 bg-white rounded-[2rem] shadow-xl border-2 border-indigo-100 flex items-center justify-center text-5xl font-black text-indigo-600 mb-12">
                                    {nback.current}
                                </div>
                                <div className="flex gap-4 w-full max-w-xs">
                                    <button onClick={() => {
                                        if(nback.isMatch) setScore(s=>s+30); else setTimeLeft(t=>Math.max(0, t-4));
                                        nextNback();
                                    }} className="flex-1 py-6 bg-indigo-600 text-white rounded-2xl font-black">匹配</button>
                                    <button onClick={() => {
                                        if(!nback.isMatch) setScore(s=>s+5); else setTimeLeft(t=>Math.max(0, t-4));
                                        nextNback();
                                    }} className="flex-1 py-6 bg-slate-200 text-slate-600 rounded-2xl font-black">不同</button>
                                </div>
                            </div>
                        )}

                        {view === 'result' && (
                            <div className="h-full flex flex-col items-center justify-center p-8 text-center bg-white animate-slide-up">
                                <div className="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mb-4"><Icon name="trophy" className="text-amber-600" /></div>
                                <h2 className="text-xl font-black">训练结束</h2>
                                <div className="my-6">
                                    <div className="text-5xl font-black text-indigo-600">{lastScore}</div>
                                    <div className="text-[10px] text-slate-400 font-bold mt-2 tracking-widest uppercase">Points Earned</div>
                                </div>
                                {lastScore >= 500 && !history.isHardUnlocked && (
                                    <div className="mb-6 p-3 bg-green-50 text-green-700 text-xs font-bold rounded-xl animate-bounce">
                                        🎉 奇迹！进阶模式已永久解锁！
                                    </div>
                                )}
                                <button onClick={() => setView('home')} className="w-full max-w-xs py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">回到大厅</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
